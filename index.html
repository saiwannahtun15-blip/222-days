<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Story 💚</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-green: #18a63d; --heart-pink: #ff4f92; --glass-bg: rgba(255, 255, 255, 0.85); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%; height: 100vh; overflow: hidden; font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(-45deg, #ffe6f0, #e9ffe9, #fff8dd, #eef9ff);
            background-size: 400% 400%; animation: bgFlow 15s ease infinite; position: relative;
        }
        @keyframes bgFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .container {
            position: relative; z-index: 2; width: 92%; max-width: 400px;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 35px;
            padding: 25px 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); text-align: center;
        }
        h1 { font-family: 'Great Vibes', cursive; font-size: 48px; color: var(--primary-green); margin-bottom: 5px; }
        .days-count { font-weight: 500; font-size: 14px; color: #666; margin-bottom: 15px; text-transform: uppercase; }
        .slider {
            position: relative; width: 100%; height: 380px; border-radius: 25px;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.12); margin-bottom: 20px;
        }
        .slider img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .slider img.active { opacity: 1; }
        .message-box { font-size: 17px; line-height: 1.8; color: #333; min-height: 150px; margin-bottom: 10px; }
        .signature { font-family: 'Great Vibes', cursive; font-size: 30px; color: var(--heart-pink); margin-bottom: 15px; }
        .btn { border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: 600; background: var(--primary-green); color: white; margin: 5px; transition: 0.3s; }
        .btn-next { background: white; color: #333; border: 1px solid #eee; }
        .fall { position: absolute; top: -50px; pointer-events: none; z-index: 1; animation: fallAnimation linear forwards; }
        @keyframes fallAnimation { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title-text">Happy Anniversary 💚</h1>
        <div class="days-count" id="days-display">Together Forever ✨</div>
        <div class="slider">
            <img src="photo1.jpg" class="active">
            <img src="photo2.jpg">
            <img src="photo3.jpg">
            <img src="photo4.jpg">
        </div>
        <div class="message-box" id="typing-text"></div>
        <div class="signature">With Love 💚</div>
        <div class="controls">
            <button class="btn" onclick="toggleMusic()">🎵 Play Music</button>
            <button class="btn btn-next" onclick="nextSlide()">Next ➜</button>
        </div>
    </div>
    <audio id="bg-music" loop><source src="song.mp3" type="audio/mpeg"></audio>

    <script>
        // ၁။ ရက်စွဲတွက်ချက်ခြင်း
        const startDay = new Date("2025-09-21"); 
        function updateCounter() {
            const now = new Date();
            const diffDays = Math.floor((now - startDay) / (1000 * 60 * 60 * 24));
            document.getElementById("title-text").innerText = `Happy ${diffDays} Days 💚`;
        }
        updateCounter();

        // ၂။ စာသားပေါ်အောင်လုပ်ခြင်း (Typewriter fix)
        const message = `၂၀၂၅ စက်တင်ဘာလ ၂၁ ရက်နေ့ကစပြီး\nကိုကိုတို့ အခုဆိုရင် ရက်ပေါင်းများစွာ တူတူရှိခဲ့ကြပြီနော် အချစ်ရေ 💚\n\nအမှတ်တရတိုင်းအတွက် ကျေးဇူးတင်ပါတယ်။\nနောက်ထပ် နှစ်ပေါင်းများစွာအထိ\nလက်တွဲမဖြုတ်တမ်း တူတူရှေ့ဆက်ကြမယ်နော်။\n\nအရမ်းချစ်တယ် ကိုကို့သဲသဲလေး 😘💚`;
        
        let i = 0;
        const target = document.getElementById("typing-text");
        function typeWriter() {
            if (i < message.length) {
                const char = message.charAt(i);
                target.innerHTML += char === "\n" ? "<br>" : char;
                i++;
                setTimeout(typeWriter, 50);
            }
        }
        // စာရိုက်တဲ့ animation စတင်ရန်
        setTimeout(typeWriter, 500);

        // ၃။ Slideshow
        let currentSlide = 0;
        const slides = document.querySelectorAll(".slider img");
        function nextSlide() {
            slides[currentSlide].classList.remove("active");
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add("active");
        }
        setInterval(nextSlide, 4000);

        // ၄။ Music
        const music = document.getElementById("bg-music");
        function toggleMusic() {
            music.paused ? music.play() : music.pause();
        }

        // ၅။ Falling Emoji
        const emojis = ["💚", "🌸", "✨", "💓", "🌼"];
        function createFall() {
            const el = document.createElement("div");
            el.className = "fall";
            el.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = Math.random() * 100 + "vw";
            el.style.fontSize = (Math.random() * 20 + 15) + "px";
            el.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 7000);
        }
        setInterval(createFall, 400);
    </script>
</body>
</html>
